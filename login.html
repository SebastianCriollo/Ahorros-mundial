<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ahorros Mundial — Iniciar sesión</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
</head>
<body class="login-page">

  <div id="toast-container"></div>

  <div class="login-card">
    <div class="login-logo">
      <span class="icon">💰</span>
      <h1>Ahorros Mundial</h1>
      <p>Controla tus finanzas personales</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="login-panel">Iniciar sesión</button>
      <button class="tab-btn" data-tab="signup-panel">Crear cuenta</button>
    </div>

    <!-- Login -->
    <div id="login-panel" class="tab-panel active">
      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" class="form-control"
                 placeholder="tu@email.com" autocomplete="email" required>
          <span class="error-msg"></span>
        </div>
        <div class="form-group">
          <label for="login-password">Contraseña</label>
          <input type="password" id="login-password" class="form-control"
                 placeholder="••••••••" autocomplete="current-password" required>
          <span class="error-msg"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top:.5rem">
          <span class="spinner"></span>
          Entrar
        </button>
      </form>
    </div>

    <!-- Signup -->
    <div id="signup-panel" class="tab-panel">
      <form id="signup-form" novalidate>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" class="form-control"
                 placeholder="tu@email.com" autocomplete="email" required>
          <span class="error-msg"></span>
        </div>
        <div class="form-group">
          <label for="signup-password">Contraseña</label>
          <input type="password" id="signup-password" class="form-control"
                 placeholder="Mínimo 6 caracteres" autocomplete="new-password" required>
          <span class="error-msg"></span>
        </div>
        <div class="form-group">
          <label for="signup-confirm">Confirmar contraseña</label>
          <input type="password" id="signup-confirm" class="form-control"
                 placeholder="Repite la contraseña" autocomplete="new-password" required>
          <span class="error-msg"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top:.5rem">
          <span class="spinner"></span>
          Crear cuenta
        </button>
      </form>
    </div>
  </div>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
